<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f2f2f2;
        margin:0;
        padding:0;
    }

    .container{
        width:600px;
        margin:30px auto;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0px 0px 10px gray;
    }

    h1{
        text-align:center;
        color:#0066cc;
    }

    table{
        width:100%;
    }

    td{
        padding:10px;
    }

    input, select, textarea{
        width:100%;
        padding:8px;
        border-radius:5px;
        border:1px solid gray;
    }

    textarea{
        resize:none;
    }

    .gender{
        width:auto;
    }

    .btn{
        width:48%;
        padding:10px;
        border:none;
        color:white;
        cursor:pointer;
        font-size:16px;
        border-radius:5px;
    }

    .submit{
        background:green;
    }

    .reset{
        background:red;
    }

    .btn:hover{
        opacity:0.9;
    }
</style>

</head>
<body>

<div class="container">

<h1>Student Management System</h1>

<form>

<table>

<tr>
<td>Student Name</td>
<td><input type="text" placeholder="Enter Name"></td>
</tr>

<tr>
<td>Roll Number</td>
<td><input type="text" placeholder="Enter Roll Number"></td>
</tr>

<tr>
<td>Course</td>
<td>
<select>
<option>Select Course</option>
<option>B.Tech</option>
<option>B.Sc</option>
<option>B.Com</option>
<option>BCA</option>
<option>MCA</option>
</select>
</td>
</tr>

<tr>
<td>Year</td>
<td>
<select>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
</td>
</tr>

<tr>
<td>Email</td>
<td><input type="email" placeholder="Enter Email"></td>
</tr>

<tr>
<td>Phone</td>
<td><input type="tel" placeholder="Enter Phone Number"></td>
</tr>

<tr>
<td>Gender</td>
<td>
<input class="gender" type="radio" name="gender"> Male
<input class="gender" type="radio" name="gender"> Female
</td>
</tr>

<tr>
<td>Skills</td>
<td>
<input type="checkbox"> HTML
<input type="checkbox"> CSS
<input type="checkbox"> JavaScript
<input type="checkbox"> Python
</td>
</tr>

<tr>
<td>Address</td>
<td>
<textarea rows="4" placeholder="Enter Address"></textarea>
</td>
</tr>

<tr>
<td colspan="2" align="center">
<input class="btn submit" type="submit" value="Submit">
<input class="btn reset" type="reset" value="Reset">
</td>
</tr>

</table>

</form>

</div>

</body>
</html>

version: 0.0
os: linux

files:
  - source: index.html
    destination: /var/www/html
  - source: scripts
    destination: /tmp/scripts  

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 300
      runas: root
